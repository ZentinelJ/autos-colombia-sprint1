<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autos Colombia - Login</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial Black', Arial, sans-serif;
            background-color: #ffffff;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .col-left {
            flex: 0 0 50%;
            background-image: url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?w=900&q=80');
            background-size: cover;
            background-position: center;
        }
        .col-right {
            flex: 0 0 50%;
            background-color: #2e3f5c;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 80%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            background-color: #ffffff;
            border: none;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 1.5rem;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder {
            color: #8fafd4;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            background-color: #4472a8;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #5583b9;
        }
        #error-msg {
            display: none;
            color: #c07070;
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="col-left"></div>
        <div class="col-right">
            <div class="login-box">
                <h1>LOGIN</h1>
                <input type="text" id="usuario" placeholder="USUARIO">
                <input type="password" id="password" placeholder="CONTRASEÑA">
                <button onclick="login()">ENTRAR</button>
                <div id="error-msg">Usuario o contraseña incorrectos.</div>
            </div>
        </div>
    </div>

    <script>
        const VALID_USER = "demoapp";
        const VALID_PASS = "midemo1234";

        function login() {
            const user = document.getElementById("usuario").value.trim();
            const pass = document.getElementById("password").value;
            if (user === VALID_USER && pass === VALID_PASS) {
                window.location.href = "app.html";
            } else {
                const err = document.getElementById("error-msg");
                err.textContent = "Usuario o contraseña incorrectos.";
                err.style.display = "block";
            }
        }

        document.getElementById("password").addEventListener("keydown", e => {
            if (e.key === "Enter") login();
        });
    </script>
</body>
</html>
